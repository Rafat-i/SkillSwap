<div class="auth-container">
  <div class="auth-card">
    <h2>Register</h2>
    <div class="form-group">
      <label>Name</label>
      <input type="text" [(ngModel)]="name" placeholder="Full Name" />
    </div>
    <div class="form-group">
      <label>Username</label>
      <input type="text" [(ngModel)]="username" placeholder="Username" />
    </div>
    <div class="form-group">
      <label>Email</label>
      <input type="email" [(ngModel)]="email" placeholder="Email" />
    </div>
    <div class="form-group">
      <label>Password</label>
      <input type="password" [(ngModel)]="password" placeholder="Password" />
    </div>
    <div class="form-group">
      <label>Bio</label>
      <textarea [(ngModel)]="bio" placeholder="Tell us about yourself"></textarea>
    </div>
    <div class="form-group">
      <label>Skills (comma-separated)</label>
      <input type="text" [(ngModel)]="skillsInput" placeholder="Example: Angular, Node.js, CSS" />
    </div>
    <div class="error-message" *ngIf="errorMessage">{{ errorMessage }}</div>
    <div class="suggestion" *ngIf="suggestedUsername">
      Suggested username: <strong>{{ suggestedUsername }}</strong>
    </div>
    <button (click)="submit()">Register</button>
    <p>Already have an account? <a routerLink="/login">Login</a></p>
  </div>
</div>
